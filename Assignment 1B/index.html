<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="heading">Registration Form</h1>

<form>

    <!-- NAME -->
    <label for="name">Name :</label>
    <input type="text" id="name" oninput="validateName()" required>
    <span id="nameError" class="error"></span>
    <br><br>

    <!-- MOBILE -->
    <label for="tel">Mobile No. :</label>
    <input type="text" id="tel" maxlength="10" oninput="validateMobile()" required>
    <span id="mobileError" class="error"></span>
    <br><br>

    <!-- EMAIL -->
    <label for="email">Email :</label>
    <input type="email" id="email" required>
    <br><br>

    <!-- PASSWORD -->
    <label for="password">Password :</label>
    <input type="password" id="password" oninput="validatePassword()" required>
    <button type="button" id="showPassword" onclick="togglePassword()">Show</button>
    <span id="passwordError" class="error"></span>
    <br><br>

    <!-- DOB -->
    <label for="dob">Date of Birth :</label>
    <input type="date" id="dob" oninput="validateDOB()" required>
    <span id="dobError" class="error"></span>
    <br><br>

    <!-- ADDRESS -->
    <label for="address">Address :</label>
    <textarea id="address" rows="2" oninput="validateAddress()" required></textarea>
    <span id="addressError" class="error"></span>
    <br><br>

    <!-- CITY -->
    <label for="city">City :</label>
    <select id="city" required>
        <option value="">Select City</option>
        <option value="Pune">Pune</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Delhi">Delhi</option>
        <option value="Bangalore">Bangalore</option>
    </select>
    <br><br>

    <!-- GENDER -->
    <label>Gender :</label>
    <input type="radio" name="gender" id="male" value="Male" checked>
    <label for="male">Male</label>

    <input type="radio" name="gender" id="female" value="Female">
    <label for="female">Female</label>

    <input type="radio" name="gender" id="genderOther" value="Other">
    <label for="genderOther">Other</label>
    <br><br>

    <!-- HOBBIES -->
    <label>Hobbies :</label>

    <input type="checkbox" id="singing" checked>
    <label for="singing">Singing</label>

    <input type="checkbox" id="dancing">
    <label for="dancing">Dancing</label>

    <input type="checkbox" id="drawing">
    <label for="drawing">Drawing</label>

    <input type="checkbox" id="other" onchange="toggleOtherHobby()">
    <label for="other">Other</label>

    <input type="text" id="otherHobbies" placeholder="Enter other hobby" style="display:none;">
    <br><br>

    <!-- SUBMIT -->
    <input type="submit" value="Submit">

</form>

<!-- OUTPUT -->
<div class="container" style="display:none;">
    <h3>Submitted Data:</h3>
    <pre id="output"></pre>
</div>

<script src="script.js"></script>

</body>
</html>
